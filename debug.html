<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デバッグ v3</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; padding:20px; font-size:14px; }
button { display:block; width:100%; padding:14px; margin:8px 0; font-size:16px; background:#1a1a1a; color:#0f0; border:1px solid #0f0; border-radius:8px; cursor:pointer; }
.ok { color:#0f0; }
.warn { color:#ff0; }
.err { color:#f00; }
#log { margin-top:16px; line-height:1.8; }
</style>
</head>
<body>
<h2>デバッグ v3</h2>
<button onclick="testLocalStorage()">① localStorage 書き込みテスト</button>
<button onclick="checkSaveData()">② 現在のセーブデータ確認</button>
<button onclick="testSaveLoad()">③ 簡易セーブ→ロードテスト</button>
<button onclick="clearAll()">🗑 localStorageクリア</button>
<div id="log"></div>

<script>
const KEY = 'soccerGame_tamatsuku';
const log = document.getElementById('log');

function addLog(msg, cls) {
    const p = document.createElement('p');
    p.style.margin = '2px 0';
    if (cls) p.className = cls;
    p.textContent = msg;
    log.appendChild(p);
}

function testLocalStorage() {
    log.innerHTML = '<p>== ① localStorage書き込みテスト ==</p>';
    
    // 小さいデータのテスト
    try {
        localStorage.setItem('test_small', 'hello');
        const v = localStorage.getItem('test_small');
        localStorage.removeItem('test_small');
        addLog('✓ 小さいデータ(5bytes): OK, 読み戻し=' + v, 'ok');
    } catch(e) {
        addLog('✗ 小さいデータ書き込み失敗: ' + e.message, 'err');
    }
    
    // 10KBのデータのテスト
    try {
        const data10k = JSON.stringify({test: 'x'.repeat(10000)});
        localStorage.setItem('test_10k', data10k);
        const v = localStorage.getItem('test_10k');
        localStorage.removeItem('test_10k');
        addLog('✓ 10KBデータ: OK, 読み戻しサイズ=' + (v ? v.length : 0) + 'bytes', 'ok');
    } catch(e) {
        addLog('✗ 10KBデータ書き込み失敗: ' + e.message, 'err');
    }
    
    // 50KBのデータのテスト
    try {
        const data50k = JSON.stringify({test: 'x'.repeat(50000)});
        localStorage.setItem('test_50k', data50k);
        const v = localStorage.getItem('test_50k');
        localStorage.removeItem('test_50k');
        addLog('✓ 50KBデータ: OK, 読み戻しサイズ=' + (v ? v.length : 0) + 'bytes', 'ok');
    } catch(e) {
        addLog('✗ 50KBデータ書き込み失敗: ' + e.message, 'err');
    }
    
    // 現在のlocalStorage使用量
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        const v = localStorage.getItem(k);
        total += k.length + (v ? v.length : 0);
    }
    addLog('現在のlocalStorage使用量: ' + (total/1024).toFixed(1) + 'KB (' + localStorage.length + 'キー)', 'warn');
}

function checkSaveData() {
    log.innerHTML = '<p>== ② セーブデータ確認 ==</p>';
    const saved = localStorage.getItem(KEY);
    if (!saved) {
        addLog('⚠ セーブデータなし（キー: ' + KEY + '）', 'warn');
        addLog('localStorageの全キー数: ' + localStorage.length, 'warn');
        for (let i = 0; i < localStorage.length; i++) {
            addLog('  キー[' + i + ']: ' + localStorage.key(i), 'warn');
        }
        return;
    }
    addLog('✓ セーブデータあり: ' + saved.length + 'bytes (' + (saved.length/1024).toFixed(1) + 'KB)', 'ok');
    try {
        const d = JSON.parse(saved);
        addLog('✓ JSONパース: OK', 'ok');
        addLog('  gameStarted: ' + d.gameStarted, d.gameStarted ? 'ok' : 'err');
        addLog('  players: ' + (d.players ? d.players.length : 0) + '人', (d.players && d.players.length > 0) ? 'ok' : 'err');
        addLog('  money: ' + d.money, 'ok');
        addLog('  fame: ' + d.fame, 'ok');
        addLog('  clubName: ' + d.clubName, 'ok');
        addLog('  leagueStandings: ' + (d.leagueStandings ? d.leagueStandings.length : 0) + 'チーム', 'ok');
        addLog('  season: ' + d.season, 'ok');
    } catch(e) {
        addLog('✗ JSONパース失敗: ' + e.message, 'err');
    }
}

function testSaveLoad() {
    log.innerHTML = '<p>== ③ 簡易セーブ→ロードテスト ==</p>';
    
    // テスト用データを作成（ゲームデータに似た構造）
    const testData = {
        gameStarted: true,
        clubName: 'テストFC',
        money: 1234567,
        fame: 99,
        players: Array.from({length: 22}, (_, i) => ({id: 'p'+i, name: '選手'+i, level: 50})),
        leagueStandings: Array.from({length: 20}, (_, i) => ({name: 'チーム'+i, win: 5, draw: 2, loss: 3})),
        schedule: Array.from({length: 38}, (_, i) => ({round: i+1, home: 'チームA', away: 'チームB'})),
        season: 1,
        league: 5
    };
    
    const jsonStr = JSON.stringify(testData);
    addLog('テストデータサイズ: ' + jsonStr.length + 'bytes (' + (jsonStr.length/1024).toFixed(1) + 'KB)', 'warn');
    
    // 書き込み
    try {
        localStorage.setItem(KEY, jsonStr);
        addLog('✓ 書き込み: OK', 'ok');
    } catch(e) {
        addLog('✗ 書き込み失敗: ' + e.message, 'err');
        return;
    }
    
    // 読み込み
    try {
        const loaded = localStorage.getItem(KEY);
        if (!loaded) {
            addLog('✗ 読み込み: データが消えた！', 'err');
            return;
        }
        addLog('✓ 読み込み: OK (' + loaded.length + 'bytes)', 'ok');
        const parsed = JSON.parse(loaded);
        addLog('✓ パース: OK', 'ok');
        addLog('  gameStarted: ' + parsed.gameStarted, parsed.gameStarted ? 'ok' : 'err');
        addLog('  players: ' + parsed.players.length + '人', parsed.players.length > 0 ? 'ok' : 'err');
        addLog('  money: ' + parsed.money, parsed.money === 1234567 ? 'ok' : 'err');
        
        if (parsed.players.length === 22 && parsed.money === 1234567) {
            addLog('✓✓ セーブ→ロード: 完全成功！', 'ok');
        } else {
            addLog('✗ データが変わっている！', 'err');
        }
    } catch(e) {
        addLog('✗ 読み込み/パース失敗: ' + e.message, 'err');
    }
}

function clearAll() {
    if (confirm('localStorageを全てクリアしますか？')) {
        localStorage.clear();
        addLog('localStorageをクリアしました', 'warn');
    }
}
</script>
</body>
</html>
