<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デバッグ v5</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; padding:20px; font-size:14px; }
button { display:block; width:100%; padding:14px; margin:8px 0; font-size:16px; background:#1a1a1a; color:#0f0; border:1px solid #0f0; border-radius:8px; cursor:pointer; }
.ok { color:#0f0; }
.warn { color:#ff0; }
.err { color:#f00; }
#log { margin-top:16px; line-height:1.8; }
</style>
</head>
<body>
<h2>デバッグ v5</h2>
<button onclick="checkSaveData()">① セーブデータ詳細確認</button>
<button onclick="simulateFullCycle()">② saveGame→loadGameサイクルテスト（重要）</button>
<button onclick="checkConsoleLog()">③ コンソールログ確認方法</button>
<button onclick="clearAll()">🗑 localStorageクリア</button>
<div id="log"></div>
<script>
const KEY = 'soccerGame_tamatsuku';
const log = document.getElementById('log');
function addLog(msg, cls) {
    const p = document.createElement('p');
    p.style.margin = '2px 0';
    if (cls) p.className = cls;
    p.textContent = msg;
    log.appendChild(p);
}

function checkSaveData() {
    log.innerHTML = '<p>== ① セーブデータ詳細確認 ==</p>';
    const saved = localStorage.getItem(KEY);
    if (!saved) {
        addLog('△ セーブデータなし（キー: ' + KEY + '）', 'warn');
        addLog('localStorageの全キー数: ' + localStorage.length, 'warn');
        for (let i = 0; i < localStorage.length; i++) {
            addLog('  キー[' + i + ']: ' + localStorage.key(i), 'warn');
        }
        return;
    }
    addLog('✓ セーブデータあり: ' + saved.length + 'bytes (' + (saved.length/1024).toFixed(1) + 'KB)', 'ok');
    try {
        const d = JSON.parse(saved);
        addLog('✓ JSONパース: OK', 'ok');
        addLog('gameStarted: ' + d.gameStarted, d.gameStarted ? 'ok' : 'err');
        addLog('players: ' + (d.players ? d.players.length : 'null') + '人', (d.players && d.players.length > 0) ? 'ok' : 'err');
        addLog('money: ' + d.money, (d.money > 0) ? 'ok' : 'err');
        addLog('fame: ' + d.fame);
        addLog('clubName: ' + d.clubName);
        addLog('league: ' + d.league);
        addLog('season: ' + d.season);
        addLog('difficulty: ' + d.difficulty);
        addLog('leagueStandings: ' + (d.leagueStandings ? d.leagueStandings.length + 'チーム' : 'null'));
        addLog('allLeagues: ' + (d.allLeagues ? Object.keys(d.allLeagues).length + 'リーグ' : 'null'));
        addLog('schedule: ' + (d.schedule ? d.schedule.length + '試合' : 'null'));
        addLog('currentMatchIndex: ' + d.currentMatchIndex);
        if (d.players && d.players.length > 0) {
            const p0 = d.players[0];
            addLog('--- 選手[0]サンプル ---');
            addLog('  name: ' + p0.name + ', pos: ' + p0.position + ', level: ' + p0.level);
        }
    } catch(e) {
        addLog('✗ JSONパースエラー: ' + e.message, 'err');
    }
}

function simulateFullCycle() {
    log.innerHTML = '<p>== ② saveGame→loadGameサイクルテスト ==</p>';
    const saved = localStorage.getItem(KEY);
    if (!saved) {
        addLog('△ セーブデータなし。ゲームをプレイしてからテストしてください。', 'warn');
        return;
    }
    addLog('元データサイズ: ' + (saved.length/1024).toFixed(1) + 'KB', 'ok');

    // ステップ1: 元データをパース
    let d;
    try {
        d = JSON.parse(saved);
        addLog('✓ ステップ1 元データパース: OK', 'ok');
        addLog('  players: ' + (d.players ? d.players.length : 'null') + '人', (d.players && d.players.length > 0) ? 'ok' : 'err');
        addLog('  money: ' + d.money, (d.money > 0) ? 'ok' : 'err');
        addLog('  gameStarted: ' + d.gameStarted, d.gameStarted ? 'ok' : 'err');
    } catch(e) {
        addLog('✗ ステップ1 パースエラー: ' + e.message, 'err');
        return;
    }

    // ステップ2: saveGame処理をシミュレート（squadを除外して保存）
    addLog('--- ステップ2: saveGame処理シミュレート ---');
    const saveObj = Object.assign({}, d);
    if (saveObj.leagueStandings) {
        saveObj.leagueStandings = saveObj.leagueStandings.map(function(team) {
            const t = Object.assign({}, team);
            delete t.squad;
            return t;
        });
    }
    if (saveObj.allLeagues) {
        const compactLeagues = {};
        Object.keys(saveObj.allLeagues).forEach(function(tier) {
            const ld = saveObj.allLeagues[tier];
            if (!ld) { compactLeagues[tier] = ld; return; }
            const compactStandings = (ld.standings || []).map(function(team) {
                const t = Object.assign({}, team);
                delete t.squad;
                return t;
            });
            compactLeagues[tier] = Object.assign({}, ld, { standings: compactStandings });
        });
        saveObj.allLeagues = compactLeagues;
    }
    let savedJson;
    try {
        savedJson = JSON.stringify(saveObj);
        addLog('✓ saveGame後サイズ: ' + (savedJson.length/1024).toFixed(1) + 'KB', 'ok');
    } catch(e) {
        addLog('✗ JSON.stringify失敗: ' + e.message, 'err');
        return;
    }

    // ステップ3: 実際にlocalStorageに書き込み→読み込み
    addLog('--- ステップ3: localStorage書き込み→読み込み ---');
    try {
        localStorage.setItem(KEY + '_cycletest', savedJson);
        const reread = localStorage.getItem(KEY + '_cycletest');
        localStorage.removeItem(KEY + '_cycletest');
        if (!reread) {
            addLog('✗ 書き込み後に読み込めない！', 'err');
            return;
        }
        addLog('✓ 書き込み→読み込み: OK (' + reread.length + 'bytes)', 'ok');

        // ステップ4: 再パース（loadGame処理）
        addLog('--- ステップ4: loadGame処理（再パース） ---');
        const reloaded = JSON.parse(reread);
        addLog('再ロード後 players: ' + (reloaded.players ? reloaded.players.length : 'null') + '人', (reloaded.players && reloaded.players.length > 0) ? 'ok' : 'err');
        addLog('再ロード後 money: ' + reloaded.money, (reloaded.money > 0) ? 'ok' : 'err');
        addLog('再ロード後 gameStarted: ' + reloaded.gameStarted, reloaded.gameStarted ? 'ok' : 'err');

        // ステップ5: Object.assign
        addLog('--- ステップ5: Object.assign ---');
        const gameDataSim = { gameStarted: false, players: [], money: 1000000, fame: 60 };
        Object.assign(gameDataSim, reloaded);
        addLog('assign後 players: ' + (gameDataSim.players ? gameDataSim.players.length : 'null') + '人', (gameDataSim.players && gameDataSim.players.length > 0) ? 'ok' : 'err');
        addLog('assign後 money: ' + gameDataSim.money, (gameDataSim.money > 0) ? 'ok' : 'err');
        addLog('assign後 gameStarted: ' + gameDataSim.gameStarted, gameDataSim.gameStarted ? 'ok' : 'err');

        // 最終判定
        addLog('--- 最終判定 ---');
        if (gameDataSim.players && gameDataSim.players.length > 0 && gameDataSim.money > 0 && gameDataSim.gameStarted) {
            addLog('✓✓ saveGame→loadGameサイクル: 完全正常！', 'ok');
            addLog('→ localStorageとJSONの処理は問題なし', 'ok');
            addLog('→ 問題はゲームのJavaScript実行中にある', 'warn');
            addLog('→ renderGame()またはその後の処理が原因の可能性', 'warn');
            addLog('→ ゲームページのコンソールログを確認してください', 'warn');
        } else {
            addLog('✗✗ saveGame→loadGameサイクルでデータ消失！', 'err');
            addLog('  players: ' + (gameDataSim.players ? gameDataSim.players.length : 'null'), 'err');
            addLog('  money: ' + gameDataSim.money, 'err');
            addLog('  gameStarted: ' + gameDataSim.gameStarted, 'err');
        }
    } catch(e) {
        addLog('✗ エラー: ' + e.message, 'err');
    }
}

function checkConsoleLog() {
    log.innerHTML = '<p>== ③ コンソールログ確認方法 ==</p>';
    addLog('iPhoneのSafariでコンソールを見る方法:', 'warn');
    addLog('1. MacのSafariを開く');
    addLog('2. 環境設定→詳細→「メニューバーに開発メニューを表示」をON');
    addLog('3. iPhoneのSafariでゲームページを開く');
    addLog('4. MacのSafari→開発→[iPhoneの名前]→ゲームのURL');
    addLog('5. コンソールタブで[loadGame完了]と[init]のログを確認');
    addLog('');
    addLog('または: iPhoneのSafari設定→詳細→Webインスペクタをオン');
    addLog('');
    addLog('ゲームページ(index.html)で確認すべきログ:');
    addLog('[loadGame完了] players=XX, money=XXXXXX, gameStarted=true', 'ok');
    addLog('[init] loadGame後: players=XX, money=XXXXXX, gameStarted=true', 'ok');
    addLog('もしplayers=0またはgameStarted=falseなら問題あり', 'err');
}

function clearAll() {
    if (confirm('localStorageを全てクリアしますか？')) {
        localStorage.clear();
        log.innerHTML = '<p>localStorageをクリアしました</p>';
    }
}
</script>
</body>
</html>
