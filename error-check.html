<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エラーチェック</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
#log { background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; margin-top: 10px; min-height: 200px; }
button { background: #4fc3f7; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>
<h2>🔍 ゲームエラーチェック</h2>
<div id="log">読み込み中...</div>
<button onclick="checkLS()">LocalStorageを確認</button>
<button onclick="loadGamePage()">ゲームページを開く</button>

<script>
var logEl = document.getElementById('log');
var logs = [];

function addLog(msg) {
    logs.push(new Date().toLocaleTimeString() + ': ' + msg);
    logEl.textContent = logs.join('\n');
}

// エラーをキャッチ
window.onerror = function(msg, src, line, col, err) {
    addLog('❌ エラー: ' + msg + ' (行' + line + ')');
    return false;
};

window.addEventListener('unhandledrejection', function(e) {
    addLog('❌ Promise拒否: ' + e.reason);
});

function checkLS() {
    try {
        var raw = localStorage.getItem('soccerGame_tamatsuku');
        if (!raw) {
            addLog('⚠️ LocalStorageにデータなし');
            return;
        }
        addLog('✅ LSサイズ: ' + raw.length + ' bytes');
        var parsed = JSON.parse(raw);
        addLog('✅ LS.money: ' + parsed.money);
        addLog('✅ LS.players: ' + (parsed.players ? parsed.players.length : 'null') + '人');
        addLog('✅ LS.gameStarted: ' + parsed.gameStarted);
        addLog('✅ LS.clubName: ' + parsed.clubName);
    } catch(e) {
        addLog('❌ LSエラー: ' + e.message);
    }
}

// ゲームページをiframeで読み込んでエラーを確認
function loadGamePage() {
    addLog('ゲームページに移動します...');
    setTimeout(function() {
        location.href = './index.html';
    }, 500);
}

addLog('エラーチェックページ読み込み完了');
addLog('iOSバージョン: ' + navigator.userAgent);
checkLS();
</script>
</body>
</html>
