<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲームエラーチェック</title>
<style>
body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
h1 { color: #fff; }
#log { background: #000; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
button { background: #4fc3f7; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; margin: 8px 4px; cursor: pointer; display: block; width: 100%; }
</style>
</head>
<body>
<h1>🔍 ゲームエラーチェック</h1>
<div id="log">読み込み中...</div>
<button onclick="checkAll()">全てチェック</button>
<button onclick="clearAll()">ログをクリア</button>
<button onclick="loadGamePage()">ゲームページを開く</button>
<script>
var logEl = document.getElementById('log');
function addLog(msg) {
    logEl.textContent += '\n' + new Date().toTimeString().slice(0,8) + ': ' + msg;
}
function checkAll() {
    logEl.textContent = '';
    addLog('=== LocalStorageチェック ===');
    try {
        var raw = localStorage.getItem('soccerGame_tamatsuku');
        if (!raw) { addLog('⚠️ LocalStorageにデータなし'); }
        else {
            addLog('✅ LSサイズ: ' + raw.length + ' bytes');
            var parsed = JSON.parse(raw);
            addLog('✅ LS.money: ' + parsed.money);
            addLog('✅ LS.players: ' + (parsed.players ? parsed.players.length : 'null') + '人');
            addLog('✅ LS.gameStarted: ' + parsed.gameStarted);
            addLog('✅ LS.clubName: ' + parsed.clubName);
        }
    } catch(e) { addLog('❌ LSエラー: ' + e.message); }

    addLog('\n=== エラーログ（window.onerror） ===');
    var errLog = localStorage.getItem('_dbgErrLog');
    if (errLog) { addLog(errLog); }
    else { addLog('なし'); }

    addLog('\n=== 旧デバッグログ ===');
    var dbg = localStorage.getItem('_dbgLog');
    if (dbg) { addLog(dbg); }
    else { addLog('なし'); }
}
function clearAll() {
    localStorage.removeItem('_dbgLog');
    localStorage.removeItem('_dbgErrLog');
    localStorage.removeItem('_dbg_2nd');
    localStorage.removeItem('_dbg_2nd_err');
    logEl.textContent = '';
    addLog('ログをクリアしました');
}
function loadGamePage() {
    addLog('ゲームページに移動します...');
    setTimeout(function() { window.location.href = './'; }, 200);
}
// 初回自動チェック
logEl.textContent = '';
addLog('エラーチェックページ読み込み完了');
checkAll();
</script>
</body>
</html>
